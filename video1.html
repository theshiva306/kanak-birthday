<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secret Page</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b12;
      --card: #0e1220;
      --border: rgba(255,255,255,0.07);
      --text: #eceaf5;
      --muted: rgba(236,234,245,0.38);
      --accent: #7c6aff;
      --accent2: #c084fc;
      --error: #f06060;
      --glow: rgba(124,106,255,0.18);
    }

    html, body { height: 100%; overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      color: var(--text);
      background: var(--bg);
      min-height: 100%;
    }

    /* ── Animated gradient background ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-layer::before {
      content: '';
      position: absolute;
      width: 900px; height: 900px;
      top: -300px; left: -200px;
      background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 65%);
      animation: drift1 14s ease-in-out infinite alternate;
    }
    .bg-layer::after {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      bottom: -200px; right: -150px;
      background: radial-gradient(circle, rgba(192,132,252,0.1) 0%, transparent 65%);
      animation: drift2 17s ease-in-out infinite alternate;
    }
    @keyframes drift1 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(80px, 60px) scale(1.1); }
    }
    @keyframes drift2 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(-60px,-50px) scale(1.08); }
    }

    /* grain */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.45;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ══════════════════════════════
       PASSWORD SCREEN
    ══════════════════════════════ */
    #lock-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: opacity 0.75s ease, visibility 0.75s ease;
    }
    #lock-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 2;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 3rem 2.4rem 2.6rem;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.3rem;
      box-shadow:
        0 0 0 1px rgba(124,106,255,0.08),
        0 30px 70px rgba(0,0,0,0.55),
        0 0 80px rgba(124,106,255,0.06);
    }

    /* top gradient line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,106,255,0.6), rgba(192,132,252,0.5), transparent);
      border-radius: 1px;
    }

    .lock-ring {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(124,106,255,0.15), rgba(192,132,252,0.1));
      border: 1px solid rgba(124,106,255,0.25);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(124,106,255,0.15);
    }
    .lock-ring svg { color: var(--accent2); }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 400;
      text-align: center;
      line-height: 1.35;
      letter-spacing: 0.01em;
      background: linear-gradient(135deg, #eceaf5, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-hint {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .input-wrap {
      width: 100%;
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--border);
      border-radius: 11px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.98rem;
      font-weight: 300;
      padding: 0.88rem 3rem 0.88rem 1.15rem;
      outline: none;
      letter-spacing: 0.07em;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-wrap input:focus {
      border-color: rgba(124,106,255,0.5);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.1);
    }

    .eye-btn {
      position: absolute;
      right: 0.95rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      display: flex; align-items: center;
      transition: color 0.2s;
      padding: 0;
    }
    .eye-btn:hover { color: var(--text); }

    .submit-btn {
      width: 100%;
      padding: 0.92rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124,106,255,0.3);
    }
    .submit-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,106,255,0.4);
    }
    .submit-btn:active { transform: translateY(0); }

    .error-msg {
      min-height: 1.1em;
      font-size: 0.82rem;
      color: var(--error);
      text-align: center;
      letter-spacing: 0.03em;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-9px); }
      30%      { transform: translateX(9px); }
      45%      { transform: translateX(-6px); }
      60%      { transform: translateX(6px); }
      75%      { transform: translateX(-3px); }
      90%      { transform: translateX(3px); }
    }
    .shake { animation: shake 0.5s ease; }

    /* ══════════════════════════════
       CONTENT SCREEN
    ══════════════════════════════ */
    #content-screen {
      position: relative;
      z-index: 5;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.5rem;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    #content-screen.visible { display: flex; }
    #content-screen.fade-in { opacity: 1; }

    .content-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 1.8rem;
      text-align: center;
    }

    /* Thumbnail card */
    .thumb-link {
      display: block;
      position: relative;
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      box-shadow:
        0 0 0 1px rgba(124,106,255,0.12),
        0 20px 60px rgba(0,0,0,0.6),
        0 0 60px rgba(124,106,255,0.08);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.35s ease;
    }
    .thumb-link:hover {
      transform: scale(1.035) translateY(-4px);
      box-shadow:
        0 0 0 1px rgba(192,132,252,0.25),
        0 28px 80px rgba(0,0,0,0.65),
        0 0 80px rgba(124,106,255,0.2);
    }

    /* thumbnail image (YouTube maxresdefault) */
    .thumb-img {
      display: block;
      width: 100%;
      aspect-ratio: 9/16;
      object-fit: cover;
      background: #111;
    }

    /* gradient overlay */
    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(8,11,18,0.1) 0%,
        rgba(8,11,18,0.05) 40%,
        rgba(8,11,18,0.55) 100%
      );
      transition: background 0.3s;
    }
    .thumb-link:hover .thumb-overlay {
      background: linear-gradient(
        to bottom,
        rgba(124,106,255,0.08) 0%,
        rgba(8,11,18,0.05) 40%,
        rgba(8,11,18,0.5) 100%
      );
    }

    /* play button */
    .play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
                  background 0.3s, border-color 0.3s;
    }
    .play-btn svg {
      color: #fff;
      margin-left: 5px; /* optical center for play triangle */
    }
    .thumb-link:hover .play-btn {
      transform: translate(-50%, -50%) scale(1.12);
      background: rgba(124,106,255,0.4);
      border-color: rgba(192,132,252,0.6);
    }

    /* tap hint */
    .tap-hint {
      margin-top: 1.4rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* lock again */
    .lock-again-btn {
      margin-top: 2.4rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 0.58rem 1.3rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .lock-again-btn:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.18);
    }

    @media (max-width: 440px) {
      .card { padding: 2.2rem 1.4rem 2rem; }
      .card-title { font-size: 1.3rem; }
      .thumb-link { max-width: 100%; }
    }
  </style>
</head>
<body>

  <div class="bg-layer"></div>
  <div class="grain"></div>

  <!-- ── PASSWORD SCREEN ── -->
  <div id="lock-screen">
    <div class="card" id="lock-card">

      <div class="lock-ring">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <h1 class="card-title">Enter password<br>to open site</h1>
      <p class="card-hint">Hint: your names</p>

      <div class="input-wrap">
        <input type="password" id="pw-input"
               placeholder="Password"
               autocomplete="off"
               spellcheck="false"/>
        <button class="eye-btn" id="eye-btn" type="button" aria-label="Toggle password">
          <svg id="eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <svg id="eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round"
               style="display:none">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button class="submit-btn" id="submit-btn">Unlock</button>
      <div class="error-msg" id="error-msg"></div>

    </div>
  </div>

  <!-- ── CONTENT SCREEN ── -->
  <div id="content-screen">
    <p class="content-label">something for you ♡</p>

    <a class="thumb-link"
       href="https://youtube.com/shorts/NHB7xMp30L8"
       target="_blank"
       rel="noopener noreferrer"
       aria-label="Watch the video">

      <!-- YouTube thumbnail — falls back to a gradient if blocked -->
      <img class="thumb-img"
           src="https://img.youtube.com/vi/NHB7xMp30L8/maxresdefault.jpg"
           alt="Video thumbnail"
           onerror="this.style.background='linear-gradient(135deg,#1a1030,#0e0e1a)'; this.removeAttribute('src');"/>

      <div class="thumb-overlay"></div>

      <div class="play-btn">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </div>

    </a>

    <p class="tap-hint">tap to watch ↑</p>

    <button class="lock-again-btn" id="lock-again-btn">🔒 lock again</button>
  </div>

  <script>
    const PASSWORD = 'hawasihamster';

    const lockScreen    = document.getElementById('lock-screen');
    const lockCard      = document.getElementById('lock-card');
    const contentScreen = document.getElementById('content-screen');
    const pwInput       = document.getElementById('pw-input');
    const submitBtn     = document.getElementById('submit-btn');
    const errorMsg      = document.getElementById('error-msg');
    const eyeBtn        = document.getElementById('eye-btn');
    const eyeOn         = document.getElementById('eye-on');
    const eyeOff        = document.getElementById('eye-off');
    const lockAgainBtn  = document.getElementById('lock-again-btn');

    // Eye toggle
    eyeBtn.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type  = show ? 'text' : 'password';
      eyeOn.style.display  = show ? 'block' : 'none';
      eyeOff.style.display = show ? 'none'  : 'block';
    });

    // Enter key
    pwInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    submitBtn.addEventListener('click', checkPassword);

    function checkPassword() {
      const val = pwInput.value.trim().toLowerCase();
      if (val === PASSWORD) {
        unlock();
      } else {
        errorMsg.textContent = 'Wrong password';
        lockCard.classList.remove('shake');
        void lockCard.offsetWidth; // reflow to retrigger animation
        lockCard.classList.add('shake');
      }
    }

    function unlock() {
      errorMsg.textContent = '';
      lockScreen.classList.add('hidden');
      contentScreen.classList.add('visible');
      requestAnimationFrame(() =>
        requestAnimationFrame(() =>
          contentScreen.classList.add('fade-in')
        )
      );
    }

    lockAgainBtn.addEventListener('click', () => window.location.reload());
  </script>
</body>
</html>
