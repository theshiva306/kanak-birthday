<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You ✦</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #e8c97a;
      --gold-dim: rgba(232,201,122,0.12);
      --gold-glow: rgba(232,201,122,0.35);
      --surface: rgba(12,10,18,0.72);
      --border: rgba(255,255,255,0.1);
      --border-gold: rgba(232,201,122,0.25);
      --text: #f0ece4;
      --muted: rgba(240,236,228,0.42);
      --danger: #ff7b7b;
    }

    html, body {
      height: 100%;
      background: #060408;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    #aurora-canvas, #star-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none;
    }
    #aurora-canvas { z-index: 0; }
    #star-canvas   { z-index: 1; }

    .grain {
      position: fixed; inset: 0; z-index: 998; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.038'/%3E%3C/svg%3E");
    }

    /* ══ LOCK SCREEN ══ */
    #lock-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.9s cubic-bezier(0.4,0,0.2,1),
                  transform 0.9s cubic-bezier(0.4,0,0.2,1),
                  visibility 0.9s;
    }
    #lock-screen.hidden {
      opacity: 0; transform: scale(1.05);
      visibility: hidden; pointer-events: none;
    }

    #particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .p-dot {
      position: absolute; width: 2px; height: 2px; border-radius: 50%;
      background: var(--gold); opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 0.55; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
    }

    .lock-card {
      position: relative; z-index: 10;
      width: min(420px, 92vw);
      padding: 3.5rem 3rem 3rem;
      background: var(--surface);
      border: 1px solid var(--border-gold);
      border-radius: 28px;
      backdrop-filter: blur(40px) saturate(1.5);
      -webkit-backdrop-filter: blur(40px) saturate(1.5);
      display: flex; flex-direction: column; align-items: center; gap: 1.8rem;
      animation: cardIn 1.1s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .lock-card::before {
      content: ''; position: absolute; top: 0; left: 18%; right: 18%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .lock-card::after {
      content: ''; position: absolute; inset: -70px; z-index: -1; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(232,201,122,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .lock-icon {
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--gold-dim); border: 1px solid var(--border-gold);
      display: flex; align-items: center; justify-content: center;
      animation: iconPulse 3.5s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(232,201,122,0); }
      50%      { box-shadow: 0 0 0 12px rgba(232,201,122,0.07); }
    }
    .lock-icon svg { width: 22px; height: 22px; stroke: var(--gold); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

    .lock-headline { text-align: center; }
    .lock-headline h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400; font-size: clamp(1.5rem, 5vw, 2rem);
      letter-spacing: 0.01em; line-height: 1.25;
      background: linear-gradient(160deg, #f5ecd4 30%, #c9a55a 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .lock-headline p {
      margin-top: 0.55rem; font-size: 0.72rem;
      color: var(--muted); letter-spacing: 0.13em; text-transform: uppercase;
    }

    .input-wrap { position: relative; width: 100%; }
    .input-wrap input {
      width: 100%; padding: 0.9rem 3.2rem 0.9rem 1.25rem;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 14px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 300;
      letter-spacing: 0.05em; outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    .input-wrap input::placeholder { color: var(--muted); }
    .input-wrap input:focus {
      border-color: var(--border-gold);
      background: rgba(232,201,122,0.05);
      box-shadow: 0 0 0 3px rgba(232,201,122,0.09);
    }
    .input-wrap input.shake { animation: shake 0.42s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      18%     { transform: translateX(-9px); }
      36%     { transform: translateX(9px); }
      54%     { transform: translateX(-6px); }
      72%     { transform: translateX(6px); }
      90%     { transform: translateX(-3px); }
    }

    .eye-btn {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: var(--muted); transition: color 0.2s; display: flex; align-items: center;
    }
    .eye-btn:hover { color: var(--gold); }
    .eye-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }

    .error-msg {
      font-size: 0.74rem; color: var(--danger); height: 0.9em;
      letter-spacing: 0.07em; opacity: 0; transition: opacity 0.2s;
    }
    .error-msg.visible { opacity: 1; }

    .submit-btn {
      position: relative; overflow: hidden; width: 100%; padding: 0.95rem;
      background: linear-gradient(120deg, #b8902a, #e8c97a, #c9a55a);
      background-size: 200% 100%;
      border: none; border-radius: 14px; color: #130e00;
      font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 400;
      letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
      transition: background-position 0.5s ease, transform 0.15s, box-shadow 0.3s;
      box-shadow: 0 4px 28px rgba(201,165,80,0.22);
    }
    .submit-btn:hover {
      background-position: 100% 0;
      box-shadow: 0 6px 36px rgba(232,201,122,0.38);
    }
    .submit-btn:active { transform: scale(0.984); }
    .submit-btn::after {
      content: ''; position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      transform: skewX(-20deg); animation: shimmer 3.2s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100% { left: -80%; } 55% { left: 140%; } }

    /* ══ CONTENT ══ */
    #content {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.8rem;
      padding: 2rem; overflow-y: auto;
      opacity: 0; visibility: hidden;
      transition: opacity 1s ease 0.25s, visibility 0s 1.25s;
    }
    #content.visible {
      opacity: 1; visibility: visible;
      transition: opacity 1s ease 0.25s, visibility 0s 0s;
    }

    .content-eyebrow {
      display: flex; align-items: center; gap: 12px;
      animation: fadeUp 0.9s ease both;
    }
    .content-eyebrow span {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      background: linear-gradient(135deg, #f0e4c0, #c9a55a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 0.04em;
    }
    .eyebrow-line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
    .eyebrow-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .video-outer {
      position: relative; width: min(740px, 100%);
      animation: fadeUp 0.9s ease 0.18s both;
    }
    .video-halo {
      position: absolute; inset: -60px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(232,201,122,0.14) 0%, transparent 65%);
      pointer-events: none;
    }
    .video-shell {
      position: relative; z-index: 1; border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(232,201,122,0.2);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 30px 80px rgba(0,0,0,0.75), 0 0 70px rgba(232,201,122,0.08);
    }
    .video-shell::before { content: ''; display: block; padding-top: 56.25%; }
    .video-shell iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    .back-btn {
      background: none; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px; padding: 0.45rem 1.5rem;
      color: var(--muted); font-family: 'Inter', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
      animation: fadeUp 0.9s ease 0.32s both;
    }
    .back-btn:hover { border-color: rgba(232,201,122,0.3); color: var(--gold); }

    /* ══ BURST ══ */
    #burst {
      position: fixed; inset: 0; z-index: 200; pointer-events: none;
      display: flex; align-items: center; justify-content: center; opacity: 0;
    }
    #burst.active { animation: burstFade 1s ease forwards; }
    @keyframes burstFade { 0%{opacity:0} 20%{opacity:1} 100%{opacity:0} }
    .burst-ring {
      position: absolute; border-radius: 50%;
      border: 1.5px solid rgba(232,201,122,0.5);
    }
    #burst.active .burst-ring:nth-child(1) { width:60px;height:60px; animation: ringExpand 0.9s ease forwards; }
    #burst.active .burst-ring:nth-child(2) { width:60px;height:60px; animation: ringExpand 0.9s 0.07s ease forwards; }
    #burst.active .burst-ring:nth-child(3) { width:60px;height:60px; animation: ringExpand 0.9s 0.14s ease forwards; }
    @keyframes ringExpand {
      from { transform: scale(1); opacity: 0.9; border-color: rgba(232,201,122,0.6); }
      to   { transform: scale(8); opacity: 0; border-color: rgba(232,201,122,0); }
    }
  </style>
</head>
<body>

  <canvas id="aurora-canvas"></canvas>
  <canvas id="star-canvas"></canvas>
  <div class="grain"></div>
  <div id="particles"></div>

  <div id="burst">
    <div class="burst-ring"></div>
    <div class="burst-ring"></div>
    <div class="burst-ring"></div>
  </div>

  <!-- LOCK SCREEN -->
  <div id="lock-screen">
    <div class="lock-card">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2.5"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="lock-headline">
        <h1>Enter password to open site</h1>
        <p>Hint: your names</p>
      </div>
      <div class="input-wrap">
        <input type="password" id="pw-input" placeholder="Password…" autocomplete="off"/>
        <button class="eye-btn" id="eye-btn" aria-label="Toggle password visibility">
          <svg id="eye-icon" viewBox="0 0 24 24" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="error-msg" id="error-msg">Wrong password — try again</p>
      <button class="submit-btn" id="submit-btn">Unlock</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div class="content-eyebrow">
      <div class="eyebrow-line"></div>
      <span>just for you</span>
      <div class="eyebrow-line r"></div>
    </div>
    <div class="video-outer">
      <div class="video-halo"></div>
      <div class="video-shell">
        <!--
          Replace dQw4w9WgXcQ with your YouTube video ID
          (the part after watch?v= in the URL)
        -->
       
  <iframe
  src="https://www.youtube-nocookie.com/embed/NHB7xMp30L8"
  style="width: 100%; height: 100%; border: none;"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>
</div>
      </div>
    </div>
    <button class="back-btn" id="back-btn">Lock again</button>
  </div>

  <script>
  /* 1. AURORA */
  (function(){
    const c = document.getElementById('aurora-canvas');
    const ctx = c.getContext('2d');
    let W, H;
    const resize = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
    resize(); addEventListener('resize', resize);

    const orbs = [
      { x:.18, y:.35, vx:.00013, vy:.00009, r:.72, rgb:[160,90,255] },
      { x:.78, y:.62, vx:-.0001, vy:.00012, r:.65, rgb:[232,160,70] },
      { x:.5,  y:.05, vx:.00009, vy:.00015, r:.6,  rgb:[70,150,255] },
      { x:.08, y:.82, vx:.00014, vy:-.0001, r:.52, rgb:[255,90,130] },
      { x:.92, y:.22, vx:-.0001, vy:.00011, r:.48, rgb:[50,210,170] },
    ];

    function draw(){
      ctx.fillStyle='#060408'; ctx.fillRect(0,0,W,H);
      ctx.globalCompositeOperation='screen';
      orbs.forEach(o=>{
        const cx=o.x*W, cy=o.y*H, rad=Math.min(W,H)*o.r;
        const [r,g,b]=o.rgb;
        const g2=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        g2.addColorStop(0,  `rgba(${r},${g},${b},0.24)`);
        g2.addColorStop(.45,`rgba(${r},${g},${b},0.10)`);
        g2.addColorStop(1,  `rgba(${r},${g},${b},0)`);
        ctx.fillStyle=g2;
        ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
        o.x+=o.vx; o.y+=o.vy;
        if(o.x<0||o.x>1)o.vx*=-1;
        if(o.y<0||o.y>1)o.vy*=-1;
        o.x=Math.max(0,Math.min(1,o.x));
        o.y=Math.max(0,Math.min(1,o.y));
      });
      ctx.globalCompositeOperation='source-over';
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* 2. STARS */
  (function(){
    const c=document.getElementById('star-canvas');
    const ctx=c.getContext('2d');
    let W,H,stars=[];
    function resize(){
      W=c.width=innerWidth; H=c.height=innerHeight;
      stars=Array.from({length:140},()=>({
        x:Math.random(), y:Math.random(),
        r:Math.random()*1.2+0.2,
        phase:Math.random()*Math.PI*2,
        speed:Math.random()*0.012+0.006,
      }));
    }
    resize(); addEventListener('resize',resize);
    let t=0;
    function draw(){
      ctx.clearRect(0,0,W,H); t+=1;
      stars.forEach(s=>{
        const alpha=0.15+0.6*(0.5+0.5*Math.sin(t*s.speed+s.phase));
        ctx.beginPath();
        ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,248,225,${alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* 3. PARTICLES */
  (function(){
    const container=document.getElementById('particles');
    function spawn(){
      const d=document.createElement('div');
      d.className='p-dot';
      d.style.left=Math.random()*100+'vw';
      d.style.bottom='-4px';
      const dur=7+Math.random()*9;
      d.style.animationDuration=dur+'s';
      container.appendChild(d);
      setTimeout(()=>d.remove(),dur*1000);
    }
    setInterval(spawn,380);
  })();

  /* 4. PASSWORD */
  // ── SET YOUR PASSWORD HERE ──
  const PASSWORD = 'hawasihamster';

  const lockScreen=document.getElementById('lock-screen');
  const content=document.getElementById('content');
  const input=document.getElementById('pw-input');
  const errorMsg=document.getElementById('error-msg');
  const submitBtn=document.getElementById('submit-btn');
  const eyeBtn=document.getElementById('eye-btn');
  const eyeIcon=document.getElementById('eye-icon');
  const backBtn=document.getElementById('back-btn');
  const burst=document.getElementById('burst');

  eyeBtn.addEventListener('click',()=>{
    const h=input.type==='password';
    input.type=h?'text':'password';
    eyeIcon.innerHTML=h
      ?`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`
      :`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
  });

  function attempt(){
    if(input.value.trim().toLowerCase()===PASSWORD.toLowerCase()){
      burst.classList.add('active');
      setTimeout(()=>burst.classList.remove('active'),1000);
      setTimeout(()=>{ lockScreen.classList.add('hidden'); content.classList.add('visible'); },320);
    } else {
      errorMsg.classList.add('visible');
      input.classList.remove('shake');
      void input.offsetWidth;
      input.classList.add('shake');
      input.value=''; input.focus();
    }
  }

  submitBtn.addEventListener('click',attempt);
  input.addEventListener('keydown',e=>{ if(e.key==='Enter') attempt(); });
  input.addEventListener('input',()=>errorMsg.classList.remove('visible'));

  backBtn.addEventListener('click',()=>{
    content.classList.remove('visible');
    lockScreen.classList.remove('hidden');
    input.value=''; errorMsg.classList.remove('visible');
  });
  </script>
</body>
</html>
